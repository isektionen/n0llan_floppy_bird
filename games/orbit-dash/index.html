<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit Dash</title>
  <style>
    html, body {
      min-height: 100%; margin: 0;
      font-family: 'Courier New', monospace;
      background:
        radial-gradient(circle at top, rgba(16,185,129,0.2), transparent 38%),
        linear-gradient(180deg, #060612, #090916 50%, #05050d);
      color: #fff; display: grid; place-items: center;
    }
    .card {
      width: min(680px, calc(100vw - 32px));
      padding: 28px; border-radius: 24px;
      background: rgba(10,10,24,0.78);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 80px rgba(0,0,0,0.35);
    }
    .badge { letter-spacing: 4px; text-transform: uppercase; font-size: 11px; color: #34d399; }
    h1 { margin: 12px 0 8px; font-size: clamp(34px, 7vw, 58px); text-transform: uppercase; }
    p { color: rgba(255,255,255,0.72); line-height: 1.7; max-width: 52ch; }
    a {
      display: inline-block; margin-top: 18px; padding: 12px 16px; border-radius: 999px;
      color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.14);
      letter-spacing: 2px; text-transform: uppercase; font-size: 11px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Coming soon</div>
    <h1>Orbit Dash</h1>
    <p>This game slot is reserved for a future developer. Add the game inside this folder and register it in <code>games/catalog.json</code>.</p>
    <a href="/index.html">Back to hub</a>
  </main>
</body>
</html>
