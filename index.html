<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MÖSSAN N0LLAN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%; background: #0a0a14;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 16px 0 40px;
      font-family: 'Courier New', monospace;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    #gw { width: 100%; max-width: 380px; padding: 0 12px; }
    canvas { display: block; width: 100%; border-radius: 16px; touch-action: none; cursor: pointer; }
    #canvas-wrap { position: relative; }
    #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border-radius: 16px; overflow: hidden; }
    #score-display { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); font-size: 36px; font-weight: 500; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.4); letter-spacing: 2px; }
    #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: rgba(0,0,0,0.52); border-radius: 16px; pointer-events: all; padding: 20px; overflow-y: auto; }
    #overlay.hidden { display: none; }
    .ov-title { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 3px; text-transform: uppercase; text-align: center; }
    .ov-sub { font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 1px; text-align: center; }
    .ov-score { font-size: 48px; font-weight: 500; color: #FFD166; line-height: 1; }
    .medal { font-size: 34px; }
    .tap-btn { padding: 12px 32px; background: #FFD166; color: #1a1a2e; font-family: 'Courier New', monospace; font-size: 14px; font-weight: 700; letter-spacing: 2px; border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; pointer-events: all; }
    .tap-btn:active { transform: scale(0.96); }
    .tap-btn.sec { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.35); font-weight: 500; font-size: 12px; padding: 9px 24px; }
    .group-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 7px; width: 100%; pointer-events: all; }
    .g-btn { padding: 9px 6px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: #fff; font-family: 'Courier New', monospace; font-size: 11px; text-align: center; cursor: pointer; line-height: 1.3; }
    .g-btn:active { transform: scale(0.95); }
    .g-btn .g-name { font-weight: 700; font-size: 12px; display: block; }
    .g-btn .g-best { font-size: 10px; color: #FFD166; display: block; margin-top: 2px; }
    #lb-wrap { width: 100%; margin-top: 12px; background: #12122a; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.09); }
    .lb-header { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.07); flex-wrap: wrap; gap: 6px; }
    .lb-title { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 1.5px; text-transform: uppercase; }
    .lb-right { display: flex; align-items: center; gap: 8px; }
    .lb-sync { font-size: 10px; color: rgba(255,255,255,0.3); }
    .lb-sync.ok  { color: #06D6A0; }
    .lb-sync.err { color: #FF6B6B; }
    .lb-tab-row { display: flex; gap: 5px; }
    .lb-tab { font-size: 10px; padding: 3px 9px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.18); cursor: pointer; color: rgba(255,255,255,0.5); background: transparent; font-family: 'Courier New', monospace; }
    .lb-tab.active { background: rgba(55,138,221,0.22); color: #85B7EB; border-color: rgba(55,138,221,0.4); }
    .lb-row { display: flex; align-items: center; padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 10px; }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { font-size: 11px; color: rgba(255,255,255,0.3); width: 18px; text-align: center; flex-shrink: 0; }
    .lb-rank.gold   { color: #FFD166; font-weight: 700; }
    .lb-rank.silver { color: #B4B2A9; font-weight: 700; }
    .lb-rank.bronze { color: #EF9F27; font-weight: 700; }
    .lb-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .lb-gname { font-size: 12px; color: rgba(255,255,255,0.82); flex: 1; }
    .lb-pts { font-size: 13px; font-weight: 700; color: #FFD166; }
    .lb-empty { padding: 18px 14px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.25); }
    .saving-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #FFD166; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="gw">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="ui">
      <div id="score-display">0</div>
      <div id="overlay">
        <div class="ov-title">MÖSSAN N0LLAN</div>
        <div class="ov-sub">tryck för att hoppa &bull; undvik stockarna</div>
        <button class="tap-btn" id="start-btn">Spela</button>
      </div>
    </div>
  </div>

  <div id="lb-wrap">
    <div class="lb-header">
      <span class="lb-title">Ledartavla</span>
      <div class="lb-right">
        <span class="lb-sync" id="sync-status">laddar...</span>
        <div class="lb-tab-row">
          <button class="lb-tab active" id="tab-best"  onclick="showTab('best')">Bäst</button>
          <button class="lb-tab"        id="tab-games" onclick="showTab('games')">Spel</button>
        </div>
      </div>
    </div>
    <div id="lb-body"><div class="lb-empty">Laddar poäng...</div></div>
  </div>
</div>

<script>
  const GROUP_COLORS = ['#FF6B6B','#FFD166','#06D6A0','#118AB2','#9B5DE5','#F15BB5','#00BBF9','#FEE440','#FB5607','#8338EC'];
  const GROUPS = ['Red Hawks','Gold Stars','Green Wave','Blue Bolts','Purple Pack','Pink Squad','Cyan Crew','Yellow Yetis','Orange Owls','Violet Vipers'];

  let groupData = GROUPS.map((name, i) => ({ name, color: GROUP_COLORS[i], best: 0, games: 0 }));
  let currentTab = 'best';

  async function loadScores() {
    setSyncStatus('laddar...');
    try {
      const res = await fetch('/api/scores');
      if (!res.ok) throw new Error();
      const rows = await res.json();
      rows.forEach(row => {
        const g = groupData.find(g => g.name === row.group_name);
        if (g) { g.best = row.best_score || 0; g.games = row.games_played || 0; }
      });
      setSyncStatus('live', 'ok');
    } catch {
      setSyncStatus('offline', 'err');
    }
    renderLeaderboard();
  }

  async function saveScore(groupIdx, score) {
    const g = groupData[groupIdx];
    const newBest  = Math.max(g.best, score);
    const newGames = g.games + 1;
    setSyncStatus('sparar...');
    try {
      const res = await fetch('/api/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ group_name: g.name, best_score: newBest, games_played: newGames })
      });
      if (!res.ok) throw new Error();
      const saved = await res.json();
      g.best  = saved.best_score  ?? newBest;
      g.games = saved.games_played ?? newGames;
      setSyncStatus('sparat ✓', 'ok');
      setTimeout(() => setSyncStatus('live', 'ok'), 2500);
    } catch {
      g.best  = newBest;
      g.games = newGames;
      setSyncStatus('fel vid sparning', 'err');
    }
    renderLeaderboard();
  }

  function setSyncStatus(text, cls = '') {
    const el = document.getElementById('sync-status');
    if (el) { el.textContent = text; el.className = 'lb-sync ' + cls; }
  }

  /* ── Game engine ── */
  const canvas  = document.getElementById('c');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score-display');

  const W = 380, H = 520;
  canvas.width = W; canvas.height = H;

  const LOG_W = 58, GAP = 105, GRAVITY = 0.38, JUMP = -7.2, PIPE_SPEED = 2.8, HAT_X = 90;

  let state = 'idle', score = 0, raf;
  let hat, pipes, stars, groundOffset, frame;

  function initGame() {
    hat = { y: H/2-20, vy: 0, r: 16, angle: 0 };
    pipes = []; groundOffset = 0; score = 0; frame = 0;
    scoreEl.textContent = '0';
    stars = Array.from({length: 24}, () => ({
      x: Math.random()*W, y: Math.random()*(H*0.65),
      r: Math.random()*1.5+0.5, b: Math.random()
    }));
  }

  function spawnPipe() {
    pipes.push({ x: W+10, topH: 80 + Math.random()*(H-180-GAP-60), scored: false });
  }

  function drawBg() {
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, '#1a0a2e');
    grad.addColorStop(0.5, '#2d1b4e');
    grad.addColorStop(1, '#1a2a1a');
    ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
    stars.forEach(s => {
      s.b += 0.012;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${0.25+0.3*Math.sin(s.b)})`; ctx.fill();
    });
  }

  function drawGround() {
    const gy = H-55;
    ctx.fillStyle = '#1a2e0a'; ctx.fillRect(0,gy,W,55);
    ctx.fillStyle = '#2d4a14'; ctx.fillRect(0,gy,W,8);
    ctx.fillStyle = '#3d6b1a'; ctx.fillRect(0,gy,W,3);
    ctx.strokeStyle = '#4a8020'; ctx.lineWidth = 2;
    for (let i=0; i<14; i++) {
      const x = ((groundOffset*-1+i*30)%(W+30))-8;
      ctx.beginPath(); ctx.moveTo(x,gy); ctx.lineTo(x-3,gy-7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+4,gy); ctx.lineTo(x+4,gy-5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+8,gy); ctx.lineTo(x+11,gy-6); ctx.stroke();
    }
  }

  function drawOakLog(x, topH) {
    const BY = topH + GAP;
    const BH = H - 55 - BY;
    const lw = LOG_W;

    function drawLog(lx, ly, lh, flipped) {
      const barkGrad = ctx.createLinearGradient(lx,0,lx+lw,0);
      barkGrad.addColorStop(0,   '#2d1a06');
      barkGrad.addColorStop(0.2, '#5c3310');
      barkGrad.addColorStop(0.5, '#7a4518');
      barkGrad.addColorStop(0.8, '#5c3310');
      barkGrad.addColorStop(1,   '#2d1a06');
      ctx.fillStyle = barkGrad;
      ctx.fillRect(lx, ly, lw, lh);
      ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1.5;
      for (let i=0; i<5; i++) {
        const bx = lx + 6 + i*10 + Math.sin(i*1.3)*2;
        ctx.beginPath(); ctx.moveTo(bx,ly+4); ctx.lineTo(bx+2,ly+lh-4); ctx.stroke();
      }
      ctx.fillStyle = 'rgba(255,200,100,0.07)';
      ctx.fillRect(lx+lw*0.3, ly, lw*0.15, lh);
      const capH = 22;
      const capY = flipped ? ly : ly+lh-capH;
      const ringGrad = ctx.createLinearGradient(lx,0,lx+lw,0);
      ringGrad.addColorStop(0,    '#3d2008');
      ringGrad.addColorStop(0.15, '#8b5e2a');
      ringGrad.addColorStop(0.5,  '#c4863e');
      ringGrad.addColorStop(0.85, '#8b5e2a');
      ringGrad.addColorStop(1,    '#3d2008');
      ctx.fillStyle = ringGrad;
      ctx.fillRect(lx-5, capY, lw+10, capH);
      const cx = lx+lw/2, cy = capY+capH/2;
      for (let r=3; r<=12; r+=4) {
        ctx.beginPath();
        ctx.ellipse(cx, cy, r*1.8, r*0.6, 0, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(80,40,10,0.4)'; ctx.lineWidth = 1; ctx.stroke();
      }
      ctx.beginPath(); ctx.ellipse(cx-4, cy+2, 3, 2, 0.3, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(50,25,5,0.5)'; ctx.fill();
    }

    if (topH > 0) drawLog(x, 0, topH, false);
    if (BH > 0)   drawLog(x, BY, BH, true);
  }

  // Hat colours matching the photo — warm medium brown
  const HAT_MAIN   = '#7B4A2D';
  const HAT_LIGHT  = '#9A6040';
  const HAT_DARK   = '#4E2D16';
  const HAT_SHADOW = '#3A2010';

  function drawBucketHat() {
    const hx = HAT_X, hy = hat.y;
    ctx.save();
    ctx.translate(hx, hy);

    // Tilt with velocity
    const ta = Math.max(-0.3, Math.min(0.9, hat.vy * 0.055));
    hat.angle += (ta - hat.angle) * 0.18;
    ctx.rotate(hat.angle);

    const W2 = 24;  // half-width of crown
    const CH  = 20; // crown height
    const BW  = 10; // extra brim overhang each side
    const BH  = 6;  // brim thickness

    // ── Drop shadow ──
    ctx.save();
    ctx.translate(2, 3);
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.ellipse(0, BH/2, W2+BW, 4, 0, 0, Math.PI*2);
    ctx.fillStyle = '#000'; ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();

    // ── Brim — wide flat downward-sloping disc ──
    // Bottom face of brim (darker underside)
    ctx.beginPath();
    ctx.ellipse(0, BH, W2+BW, (W2+BW)*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = HAT_DARK; ctx.fill();

    // Top face of brim
    ctx.beginPath();
    ctx.ellipse(0, 0, W2+BW, (W2+BW)*0.28, 0, 0, Math.PI*2);
    ctx.fillStyle = HAT_MAIN; ctx.fill();

    // Brim edge rim
    ctx.beginPath();
    ctx.ellipse(0, 0, W2+BW, (W2+BW)*0.28, 0, 0, Math.PI*2);
    ctx.strokeStyle = HAT_SHADOW; ctx.lineWidth = 1.2; ctx.stroke();

    // Subtle brim fabric sheen
    ctx.beginPath();
    ctx.ellipse(-4, -1, (W2+BW)*0.55, (W2+BW)*0.13, -0.15, Math.PI*1.1, Math.PI*1.9);
    ctx.strokeStyle = 'rgba(255,200,150,0.12)'; ctx.lineWidth = 2; ctx.stroke();

    // ── Crown side walls ──
    // Left side (darker)
    ctx.beginPath();
    ctx.moveTo(-(W2+BW)*0.85, 0);
    ctx.lineTo(-W2, -CH);
    ctx.lineTo(-W2, -CH+1);
    ctx.lineTo(-(W2+BW)*0.85, 1);
    ctx.closePath();
    ctx.fillStyle = HAT_DARK; ctx.fill();

    // Right side (lighter)
    ctx.beginPath();
    ctx.moveTo((W2+BW)*0.85, 0);
    ctx.lineTo(W2, -CH);
    ctx.lineTo(W2, -CH+1);
    ctx.lineTo((W2+BW)*0.85, 1);
    ctx.closePath();
    ctx.fillStyle = HAT_LIGHT; ctx.fill();

    // Front face of crown — main visible surface
    ctx.beginPath();
    ctx.moveTo(-W2, 0);
    ctx.lineTo(-W2, -CH);
    ctx.lineTo(W2, -CH);
    ctx.lineTo(W2, 0);
    ctx.closePath();

    const frontGrad = ctx.createLinearGradient(-W2, 0, W2, 0);
    frontGrad.addColorStop(0,    HAT_DARK);
    frontGrad.addColorStop(0.15, HAT_MAIN);
    frontGrad.addColorStop(0.5,  HAT_LIGHT);
    frontGrad.addColorStop(0.85, HAT_MAIN);
    frontGrad.addColorStop(1,    HAT_DARK);
    ctx.fillStyle = frontGrad; ctx.fill();

    // Subtle vertical fabric texture lines
    ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1;
    for (let i = -W2+5; i < W2; i += 7) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i+1, -CH); ctx.stroke();
    }

    // Crown outline
    ctx.beginPath();
    ctx.moveTo(-W2, 0); ctx.lineTo(-W2, -CH); ctx.lineTo(W2, -CH); ctx.lineTo(W2, 0);
    ctx.strokeStyle = HAT_SHADOW; ctx.lineWidth = 1.2; ctx.stroke();

    // ── Top of hat — flat ellipse ──
    ctx.beginPath();
    ctx.ellipse(0, -CH, W2, W2*0.3, 0, 0, Math.PI*2);
    const topGrad = ctx.createRadialGradient(-5, -CH-2, 2, 0, -CH, W2);
    topGrad.addColorStop(0, HAT_LIGHT);
    topGrad.addColorStop(1, HAT_MAIN);
    ctx.fillStyle = topGrad; ctx.fill();
    ctx.strokeStyle = HAT_SHADOW; ctx.lineWidth = 1; ctx.stroke();

    // ── Hat band — thin strip just above brim ──
    ctx.beginPath();
    ctx.moveTo(-W2, -3);
    ctx.lineTo(-W2, -8);
    ctx.lineTo(W2, -8);
    ctx.lineTo(W2, -3);
    ctx.closePath();
    ctx.fillStyle = HAT_SHADOW; ctx.fill();

    // Band highlight
    ctx.beginPath();
    ctx.moveTo(-W2+2, -4);
    ctx.lineTo(W2-2, -4);
    ctx.strokeStyle = 'rgba(255,180,100,0.15)'; ctx.lineWidth = 1; ctx.stroke();

    ctx.restore();
  }

  function checkCollision() {
    const br = hat.r - 3;
    if (hat.y + br >= H-55 || hat.y - br <= 0) return true;
    for (const p of pipes) {
      if (HAT_X+br > p.x && HAT_X-br < p.x+LOG_W) {
        if (hat.y-br < p.topH || hat.y+br > p.topH+GAP) return true;
      }
    }
    return false;
  }

  function loop() {
    frame++;
    drawBg();
    if (state === 'playing') {
      groundOffset = (groundOffset+PIPE_SPEED)%30;
      hat.vy += GRAVITY; hat.y += hat.vy;
      if (frame%82===0) spawnPipe();
      for (let i=pipes.length-1; i>=0; i--) {
        pipes[i].x -= PIPE_SPEED;
        if (!pipes[i].scored && pipes[i].x+LOG_W < HAT_X) { pipes[i].scored=true; score++; scoreEl.textContent=score; }
        if (pipes[i].x+LOG_W < -10) pipes.splice(i,1);
      }
      if (checkCollision()) { state='dead'; showDeadScreen(); return; }
    } else if (state === 'idle') {
      hat.y = H/2-20 + Math.sin(frame*0.05)*8;
    }
    pipes.forEach(p => drawOakLog(p.x, p.topH));
    drawGround();
    drawBucketHat();
    raf = requestAnimationFrame(loop);
  }

  function showDeadScreen() {
    const medal = score>=40?'🥇':score>=20?'🥈':score>=10?'🥉':'💀';
    overlay.innerHTML = `
      <div class="ov-title">Game Over</div>
      <div class="medal">${medal}</div>
      <div class="ov-score">${score}</div>
      <div class="ov-sub" style="margin-bottom:2px">Välj din grupp för att spara poängen</div>
      <div class="group-grid">${GROUPS.map((g,i) => `
        <div class="g-btn" id="gbtn-${i}" onclick="submitScore(${i})" style="border-color:${GROUP_COLORS[i]}99">
          <span class="g-name" style="color:${GROUP_COLORS[i]}">${g}</span>
          <span class="g-best">bäst: ${groupData[i].best}</span>
        </div>`).join('')}
      </div>
      <button class="tap-btn sec" onclick="startGame()">Skippa &bull; spela igen</button>
    `;
    overlay.classList.remove('hidden');
  }

  async function submitScore(groupIdx) {
    document.querySelectorAll('.g-btn').forEach(b => b.style.pointerEvents='none');
    const btn = document.getElementById(`gbtn-${groupIdx}`);
    if (btn) btn.innerHTML = `<span class="saving-spinner"></span>`;
    await saveScore(groupIdx, score);
    startGame();
  }

  function startGame() {
    initGame();
    overlay.innerHTML = ''; overlay.classList.add('hidden');
    state = 'playing';
    if (raf) cancelAnimationFrame(raf);
    loop();
  }

  function flap() {
    if (state==='idle') { startGame(); return; }
    if (state!=='playing') return;
    hat.vy = JUMP;
  }

  canvas.addEventListener('pointerdown', flap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
  document.getElementById('start-btn').addEventListener('click', startGame);

  function showTab(tab) {
    currentTab = tab;
    document.getElementById('tab-best').className  = 'lb-tab'+(tab==='best'?' active':'');
    document.getElementById('tab-games').className = 'lb-tab'+(tab==='games'?' active':'');
    renderLeaderboard();
  }

  function renderLeaderboard() {
    const sorted = [...groupData].sort((a,b) => currentTab==='best' ? b.best-a.best : b.games-a.games);
    const rc = ['gold','silver','bronze'];
    document.getElementById('lb-body').innerHTML = sorted.map((g,i) => {
      const label = currentTab==='best' ? (g.best===0?'—':g.best) : (g.games===0?'—':g.games);
      return `<div class="lb-row">
        <span class="lb-rank ${rc[i]||''}">${i+1}</span>
        <span class="lb-dot" style="background:${g.color}"></span>
        <span class="lb-gname">${g.name}</span>
        <span class="lb-pts">${label}</span>
      </div>`;
    }).join('');
  }

  window.submitScore = submitScore;
  window.showTab     = showTab;
  window.startGame   = startGame;

  initGame();
  loadScores();
  loop();
</script>
</body>
</html>
