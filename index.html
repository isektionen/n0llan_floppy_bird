<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flappy Bird</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%; background: #0a0a14;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 16px 0 40px;
      font-family: 'Courier New', monospace;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    #gw { width: 100%; max-width: 380px; padding: 0 12px; }
    canvas { display: block; width: 100%; border-radius: 16px; touch-action: none; cursor: pointer; }
    #canvas-wrap { position: relative; }
    #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border-radius: 16px; overflow: hidden; }
    #score-display { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); font-size: 36px; font-weight: 500; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.4); letter-spacing: 2px; }
    #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; background: rgba(0,0,0,0.52); border-radius: 16px; pointer-events: all; padding: 20px; overflow-y: auto; }
    #overlay.hidden { display: none; }
    .ov-title { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 3px; text-transform: uppercase; }
    .ov-sub { font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 1px; text-align: center; }
    .ov-score { font-size: 48px; font-weight: 500; color: #FFD166; line-height: 1; }
    .medal { font-size: 34px; }
    .tap-btn { padding: 12px 32px; background: #FFD166; color: #1a1a2e; font-family: 'Courier New', monospace; font-size: 14px; font-weight: 700; letter-spacing: 2px; border: none; border-radius: 50px; cursor: pointer; text-transform: uppercase; pointer-events: all; }
    .tap-btn:active { transform: scale(0.96); }
    .tap-btn.sec { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.35); font-weight: 500; font-size: 12px; padding: 9px 24px; }
    .group-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 7px; width: 100%; pointer-events: all; }
    .g-btn { padding: 9px 6px; border-radius: 10px; border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: #fff; font-family: 'Courier New', monospace; font-size: 11px; text-align: center; cursor: pointer; line-height: 1.3; }
    .g-btn:active { transform: scale(0.95); }
    .g-btn .g-name { font-weight: 700; font-size: 12px; display: block; }
    .g-btn .g-best { font-size: 10px; color: #FFD166; display: block; margin-top: 2px; }
    #lb-wrap { width: 100%; margin-top: 12px; background: #12122a; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.09); }
    .lb-header { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.07); flex-wrap: wrap; gap: 6px; }
    .lb-title { font-size: 12px; font-weight: 700; color: #fff; letter-spacing: 1.5px; text-transform: uppercase; }
    .lb-right { display: flex; align-items: center; gap: 8px; }
    .lb-sync { font-size: 10px; color: rgba(255,255,255,0.3); }
    .lb-sync.ok  { color: #06D6A0; }
    .lb-sync.err { color: #FF6B6B; }
    .lb-tab-row { display: flex; gap: 5px; }
    .lb-tab { font-size: 10px; padding: 3px 9px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.18); cursor: pointer; color: rgba(255,255,255,0.5); background: transparent; font-family: 'Courier New', monospace; }
    .lb-tab.active { background: rgba(55,138,221,0.22); color: #85B7EB; border-color: rgba(55,138,221,0.4); }
    .lb-row { display: flex; align-items: center; padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); gap: 10px; }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { font-size: 11px; color: rgba(255,255,255,0.3); width: 18px; text-align: center; flex-shrink: 0; }
    .lb-rank.gold   { color: #FFD166; font-weight: 700; }
    .lb-rank.silver { color: #B4B2A9; font-weight: 700; }
    .lb-rank.bronze { color: #EF9F27; font-weight: 700; }
    .lb-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .lb-gname { font-size: 12px; color: rgba(255,255,255,0.82); flex: 1; }
    .lb-pts { font-size: 13px; font-weight: 700; color: #FFD166; }
    .lb-empty { padding: 18px 14px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.25); }
    .saving-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #FFD166; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="gw">
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="ui">
      <div id="score-display">0</div>
      <div id="overlay">
        <div class="ov-title">Flappy</div>
        <div class="ov-sub">tap to flap &bull; avoid the pipes</div>
        <button class="tap-btn" id="start-btn">Play</button>
      </div>
    </div>
  </div>

  <div id="lb-wrap">
    <div class="lb-header">
      <span class="lb-title">Leaderboard</span>
      <div class="lb-right">
        <span class="lb-sync" id="sync-status">loading...</span>
        <div class="lb-tab-row">
          <button class="lb-tab active" id="tab-best"  onclick="showTab('best')">Best</button>
          <button class="lb-tab"        id="tab-games" onclick="showTab('games')">Games</button>
        </div>
      </div>
    </div>
    <div id="lb-body"><div class="lb-empty">Loading scores...</div></div>
  </div>
</div>

<script>
  /* ── Group config ── */
  const GROUP_COLORS = ['#FF6B6B','#FFD166','#06D6A0','#118AB2','#9B5DE5','#F15BB5','#00BBF9','#FEE440','#FB5607','#8338EC'];
  const GROUPS = ['Red Hawks','Gold Stars','Green Wave','Blue Bolts','Purple Pack','Pink Squad','Cyan Crew','Yellow Yetis','Orange Owls','Violet Vipers'];

  let groupData = GROUPS.map((name, i) => ({ name, color: GROUP_COLORS[i], best: 0, games: 0 }));
  let currentTab = 'best';

  /* ── API calls — no keys here, handled server-side ── */
  async function loadScores() {
    setSyncStatus('loading...');
    try {
      const res = await fetch('/api/scores');
      if (!res.ok) throw new Error();
      const rows = await res.json();
      rows.forEach(row => {
        const g = groupData.find(g => g.name === row.group_name);
        if (g) { g.best = row.best_score || 0; g.games = row.games_played || 0; }
      });
      setSyncStatus('live', 'ok');
    } catch {
      setSyncStatus('offline', 'err');
    }
    renderLeaderboard();
  }

  async function saveScore(groupIdx, score) {
    const g = groupData[groupIdx];
    const newBest  = Math.max(g.best, score);
    const newGames = g.games + 1;
    setSyncStatus('saving...');
    try {
      const res = await fetch('/api/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          group_name:   g.name,
          best_score:   newBest,
          games_played: newGames
        })
      });
      if (!res.ok) throw new Error();
      const saved = await res.json();
      g.best  = saved.best_score  ?? newBest;
      g.games = saved.games_played ?? newGames;
      setSyncStatus('saved ✓', 'ok');
      setTimeout(() => setSyncStatus('live', 'ok'), 2500);
    } catch {
      g.best  = newBest;
      g.games = newGames;
      setSyncStatus('save failed', 'err');
    }
    renderLeaderboard();
  }

  function setSyncStatus(text, cls = '') {
    const el = document.getElementById('sync-status');
    if (el) { el.textContent = text; el.className = 'lb-sync ' + cls; }
  }

  /* ── Game engine ── */
  const canvas  = document.getElementById('c');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score-display');

  const W = 380, H = 520;
  canvas.width = W; canvas.height = H;

  const PIPE_W = 52, GAP = 148, GRAVITY = 0.38, JUMP = -7.2, PIPE_SPEED = 2.6, BIRD_X = 90;

  let state = 'idle', score = 0, raf;
  let bird, pipes, stars, groundOffset, frame;

  function initGame() {
    bird = { y: H/2-20, vy: 0, r: 14, angle: 0, flapAnim: 0 };
    pipes = []; groundOffset = 0; score = 0; frame = 0;
    scoreEl.textContent = '0';
    stars = Array.from({length: 24}, () => ({
      x: Math.random()*W, y: Math.random()*(H*0.65),
      r: Math.random()*1.5+0.5, b: Math.random()
    }));
  }

  function spawnPipe() {
    pipes.push({ x: W+10, topH: 80 + Math.random()*(H-200-GAP-60), scored: false });
  }

  function drawBg() {
    ctx.fillStyle = '#0d1b2a'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#1a3a5c'; ctx.fillRect(0,H*0.3,W,H*0.7);
    stars.forEach(s => {
      s.b += 0.015;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${0.3+0.35*Math.sin(s.b)})`; ctx.fill();
    });
  }

  function drawGround() {
    const gy = H-55;
    ctx.fillStyle = '#2d6a4f'; ctx.fillRect(0,gy,W,55);
    ctx.fillStyle = '#74c69d'; ctx.fillRect(0,gy,W,3);
    ctx.strokeStyle = '#52b788'; ctx.lineWidth = 1;
    for (let i=0; i<10; i++) {
      const x = ((groundOffset*-1+i*42)%(W+42))-10;
      ctx.beginPath(); ctx.moveTo(x,gy+5); ctx.lineTo(x+18,gy+5); ctx.stroke();
    }
  }

  function drawPipe(x, topH) {
    const BY = topH+GAP, BH = H-55-BY;
    ctx.fillStyle = '#40916c';
    ctx.beginPath(); ctx.roundRect(x,0,PIPE_W,topH-10,[0,0,5,5]); ctx.fill();
    ctx.beginPath(); ctx.roundRect(x-5,topH-20,PIPE_W+10,20,[4,4,0,0]); ctx.fill();
    ctx.beginPath(); ctx.roundRect(x-5,BY,PIPE_W+10,20,[0,0,4,4]); ctx.fill();
    ctx.beginPath(); ctx.roundRect(x,BY+20,PIPE_W,BH,[5,5,0,0]); ctx.fill();
    ctx.fillStyle = '#52b788';
    ctx.beginPath(); ctx.roundRect(x+4,0,8,topH-10,[0,0,3,3]); ctx.fill();
    ctx.beginPath(); ctx.roundRect(x+4,BY+20,8,BH,[3,3,0,0]); ctx.fill();
  }

  function drawBird() {
    ctx.save(); ctx.translate(BIRD_X, bird.y);
    const ta = Math.max(-0.4, Math.min(1.2, bird.vy*0.07));
    bird.angle += (ta-bird.angle)*0.2; ctx.rotate(bird.angle);
    const wy = Math.sin(bird.flapAnim*0.4)*6;
    ctx.fillStyle='#FFD166'; ctx.beginPath(); ctx.ellipse(0,0,16,13,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFE999'; ctx.beginPath(); ctx.ellipse(-3,-3,8,6,-0.3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF6B6B'; ctx.beginPath(); ctx.ellipse(12,2+wy,7,5,0.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FF8E53'; ctx.beginPath(); ctx.moveTo(16,-1); ctx.lineTo(23,1); ctx.lineTo(16,4); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#1a1a2e'; ctx.beginPath(); ctx.arc(9,-4,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(10,-5,1.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function checkCollision() {
    const br = bird.r-3;
    if (bird.y+br >= H-55 || bird.y-br <= 0) return true;
    for (const p of pipes) {
      if (BIRD_X+br > p.x && BIRD_X-br < p.x+PIPE_W) {
        if (bird.y-br < p.topH || bird.y+br > p.topH+GAP) return true;
      }
    }
    return false;
  }

  function loop() {
    frame++;
    drawBg();
    if (state === 'playing') {
      groundOffset = (groundOffset+PIPE_SPEED)%42;
      bird.vy += GRAVITY; bird.y += bird.vy; bird.flapAnim++;
      if (frame%88===0) spawnPipe();
      for (let i=pipes.length-1; i>=0; i--) {
        pipes[i].x -= PIPE_SPEED;
        if (!pipes[i].scored && pipes[i].x+PIPE_W < BIRD_X) { pipes[i].scored=true; score++; scoreEl.textContent=score; }
        if (pipes[i].x+PIPE_W < -10) pipes.splice(i,1);
      }
      if (checkCollision()) { state='dead'; showDeadScreen(); return; }
    } else if (state === 'idle') {
      bird.y = H/2-20+Math.sin(frame*0.05)*8; bird.flapAnim++;
    }
    pipes.forEach(p => drawPipe(p.x,p.topH));
    drawGround(); drawBird();
    raf = requestAnimationFrame(loop);
  }

  function showDeadScreen() {
    const medal = score>=40?'🥇':score>=20?'🥈':score>=10?'🥉':'💀';
    overlay.innerHTML = `
      <div class="ov-title">Game Over</div>
      <div class="medal">${medal}</div>
      <div class="ov-score">${score}</div>
      <div class="ov-sub" style="margin-bottom:2px">Select your group to save this score</div>
      <div class="group-grid">${GROUPS.map((g,i) => `
        <div class="g-btn" id="gbtn-${i}" onclick="submitScore(${i})" style="border-color:${GROUP_COLORS[i]}99">
          <span class="g-name" style="color:${GROUP_COLORS[i]}">${g}</span>
          <span class="g-best">best: ${groupData[i].best}</span>
        </div>`).join('')}
      </div>
      <button class="tap-btn sec" onclick="startGame()">Skip &bull; play again</button>
    `;
    overlay.classList.remove('hidden');
  }

  async function submitScore(groupIdx) {
    document.querySelectorAll('.g-btn').forEach(b => b.style.pointerEvents='none');
    const btn = document.getElementById(`gbtn-${groupIdx}`);
    if (btn) btn.innerHTML = `<span class="saving-spinner"></span>`;
    await saveScore(groupIdx, score);
    startGame();
  }

  function startGame() {
    initGame();
    overlay.innerHTML = ''; overlay.classList.add('hidden');
    state = 'playing';
    if (raf) cancelAnimationFrame(raf);
    loop();
  }

  function flap() {
    if (state==='idle') { startGame(); return; }
    if (state!=='playing') return;
    bird.vy = JUMP; bird.flapAnim = 0;
  }

  canvas.addEventListener('pointerdown', flap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });
  document.getElementById('start-btn').addEventListener('click', startGame);

  function showTab(tab) {
    currentTab = tab;
    document.getElementById('tab-best').className  = 'lb-tab'+(tab==='best'?' active':'');
    document.getElementById('tab-games').className = 'lb-tab'+(tab==='games'?' active':'');
    renderLeaderboard();
  }

  function renderLeaderboard() {
    const sorted = [...groupData].sort((a,b) => currentTab==='best' ? b.best-a.best : b.games-a.games);
    const rc = ['gold','silver','bronze'];
    document.getElementById('lb-body').innerHTML = sorted.map((g,i) => {
      const label = currentTab==='best' ? (g.best===0?'—':g.best) : (g.games===0?'—':g.games);
      return `<div class="lb-row">
        <span class="lb-rank ${rc[i]||''}">${i+1}</span>
        <span class="lb-dot" style="background:${g.color}"></span>
        <span class="lb-gname">${g.name}</span>
        <span class="lb-pts">${label}</span>
      </div>`;
    }).join('');
  }

  window.submitScore = submitScore;
  window.showTab     = showTab;
  window.startGame   = startGame;

  initGame();
  loadScores();
  loop();
</script>
</body>
</html>
